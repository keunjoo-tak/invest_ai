<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>InvestAI 로그인</title>
    <link rel="stylesheet" href="/assets/styles.css?v=20260319h" />
  </head>
  <body>
    <div class="bg-orb orb-a"></div>
    <div class="bg-orb orb-b"></div>
    <div class="bg-grid"></div>

    <main class="auth-shell">
      <section class="auth-card">
        <p class="eyebrow">INVESTAI ACCESS</p>
        <h1 class="auth-title">서비스 로그인</h1>
        <p class="auth-copy">
          외부 기기나 공개 URL로 접속하는 경우에도 동일한 인증 절차를 거친 뒤 서비스를 사용할 수 있습니다.
          로그인 후에는 웹 대시보드와 보호된 API에 접근할 수 있습니다.
        </p>

        <form id="login-form" class="auth-form">
          <label class="auth-field">
            <span>아이디</span>
            <input name="username" type="text" autocomplete="username" required />
          </label>
          <label class="auth-field">
            <span>비밀번호</span>
            <input name="password" type="password" autocomplete="current-password" required />
          </label>
          <button class="btn primary auth-submit" type="submit">로그인</button>
          <p id="login-error" class="auth-error hidden"></p>
        </form>

        <div class="auth-note">
          <p>로그인 정보는 <code>.env</code>의 <code>AUTH_USERNAME</code>, <code>AUTH_PASSWORD</code>를 사용합니다.</p>
          <p>로그인에 성공하면 기본적으로 <code>/app</code>으로 이동하며, 요청 경로가 있으면 해당 경로로 복귀합니다.</p>
        </div>
      </section>
    </main>

    <script type="module" src="/assets/login.js?v=20260319h"></script>
  </body>
</html>
